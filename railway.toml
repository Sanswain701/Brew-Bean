[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
# Railway automatically injects DATABASE_URL when you add a Postgres plugin.
# Add these manually in the Railway dashboard > Variables:
#   PORT=8080
#   NODE_ENV=production
#   CORS_ORIGIN=https://your-frontend.vercel.app
